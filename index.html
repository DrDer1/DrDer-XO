<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="DrDer X O - لعبة احترافية">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DrDer X O">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./192.png" sizes="192x192" type="image/png">
  <link rel="icon" href="./512.png" sizes="512x512" type="image/png">
  <link rel="apple-touch-icon" href="./192.png">
  <link rel="apple-touch-icon" href="./512.png" sizes="512x512">
  <title>DrDer X O</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-surface: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent-x: #38bdf8;
      --accent-o: #f472b6;
      --accent-success: #4ade80;
      --border-radius: 16px;
      --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      margin: 0;
      direction: rtl;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    #app {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .app-header {
      width: 100%;
      text-align: center;
      padding: 8px 0;
    }

    .app-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--accent-x), var(--accent-o));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
    }

    .screen {
      width: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .screen.active {
      display: flex;
    }

    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .btn {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      padding: 14px 24px;
      border-radius: 40px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      text-align: center;
      letter-spacing: 0.3px;
      font-family: var(--font-family);
    }

    .btn:hover {
      background: var(--bg-surface);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .primary-btn {
      background: var(--accent-x);
      color: #0f172a;
      border: none;
      font-weight: 700;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 0 8px;
    }

    .player-info {
      font-size: 1.2rem;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 20px;
      background: var(--bg-secondary);
    }

    .player-x {
      color: var(--accent-x);
    }

    .player-o {
      color: var(--accent-o);
    }

    .game-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 80%;
      aspect-ratio: 1 / 1;
      background: var(--bg-secondary);
      padding: 8px;
      border-radius: var(--border-radius);
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .cell {
      background: var(--bg-primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2.5rem, 10vw, 4rem);
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease;
      color: var(--text-primary);
      aspect-ratio: 1 / 1;
    }

    .cell.x-move {
      color: var(--accent-x);
    }

    .cell.o-move {
      color: var(--accent-o);
    }

    .cell.winner-cell {
      background: rgba(74, 222, 128, 0.25);
      box-shadow: inset 0 0 20px rgba(74, 222, 128, 0.2);
    }

    .cell:active {
      background: var(--bg-surface);
    }

    .win-line {
      position: absolute;
      background-color: rgba(74, 222, 128, 0.9);
      border-radius: 4px;
      z-index: 10;
      pointer-events: none;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.5);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--bg-secondary);
      padding: 32px;
      border-radius: 28px;
      text-align: center;
      width: 90%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
    }

    .modal-content h2 {
      font-size: 2rem;
      font-weight: 700;
    }

    .modal-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    @media (max-width: 400px) {
      .game-board {
        width: 90%;
      }
      .app-header h1 {
        font-size: 2rem;
      }
      .btn {
        padding: 12px 20px;
        font-size: 1rem;
      }
    }

    @media (min-width: 768px) {
      .game-board {
        width: 70%;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-header">
      <h1>DrDer X_O</h1>
    </div>

    <div id="mainMenuScreen" class="screen active">
      <div class="menu-buttons">
        <button class="btn" id="playAIBtn">لعب ضد الذكاء الاصطناعي</button>
        <button class="btn" id="playLocalBtn">لاعبان على نفس الجهاز</button>
      </div>
    </div>

    <div id="gameScreen" class="screen">
      <div class="game-header">
        <div class="player-info player-x" id="playerXName">X</div>
        <div class="player-info player-o" id="playerOName">O</div>
      </div>
      <div class="game-board" id="gameBoard"></div>
      <button class="btn" id="backBtn">القائمة الرئيسية</button>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <h2 id="modalTitle"></h2>
      <div class="modal-buttons">
        <button class="btn primary-btn" id="modalPlayAgainBtn">لعب مرة أخرى</button>
        <button class="btn" id="modalMainMenuBtn">القائمة الرئيسية</button>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
  <script src="./ai.js"></script>
  <script src="./app.js"></script>
</body>
</html>
