<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="DrDer X O - لعبة احترافية متعددة الأنماط">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DrDer XO">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/192.png" sizes="192x192" type="image/png">
  <link rel="icon" href="./icons/512.png" sizes="512x512" type="image/png">
  <link rel="apple-touch-icon" href="./icons/192.png">
  <link rel="apple-touch-icon" href="./icons/512.png" sizes="512x512">
  <title>DrDer X O</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-surface: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent-x: #38bdf8;
      --accent-o: #f472b6;
      --accent-success: #4ade80;
      --accent-warning: #fbbf24;
      --accent-danger: #f87171;
      --border-radius: 16px;
      --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      margin: 0;
      direction: rtl;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    #app {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .screen {
      width: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .screen.active {
      display: flex;
    }

    .game-title {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--accent-x), var(--accent-o));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .btn {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      padding: 14px 24px;
      border-radius: 40px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(4px);
      letter-spacing: 0.3px;
      font-family: var(--font-family);
    }

    .btn:hover {
      background: var(--bg-surface);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .primary-btn {
      background: var(--accent-x);
      color: #0f172a;
      border: none;
      font-weight: 700;
    }

    .primary-btn:hover {
      background: #7dd3fc;
    }

    .back-btn {
      margin-top: 8px;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 0 8px;
    }

    .player-info {
      font-size: 1.2rem;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 20px;
      background: var(--bg-secondary);
    }

    .player-x {
      color: var(--accent-x);
    }

    .player-o {
      color: var(--accent-o);
    }

    .game-board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 80%;
      aspect-ratio: 1 / 1;
      background: var(--bg-secondary);
      padding: 8px;
      border-radius: var(--border-radius);
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
    }

    .cell {
      background: var(--bg-primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2.5rem, 10vw, 4rem);
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease;
      color: var(--text-primary);
      position: relative;
      aspect-ratio: 1 / 1;
    }

    .cell.x-move {
      color: var(--accent-x);
    }

    .cell.o-move {
      color: var(--accent-o);
    }

    .cell.winner-cell {
      background: rgba(74, 222, 128, 0.25);
      box-shadow: inset 0 0 20px rgba(74, 222, 128, 0.2);
    }

    .cell:active {
      background: var(--bg-surface);
    }

    .room-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      background: var(--bg-secondary);
      padding: 12px 20px;
      border-radius: 40px;
      font-size: 0.95rem;
    }

    .viewer-badge {
      background: var(--bg-surface);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.85rem;
    }

    .lobby-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }

    .lobby-buttons {
      display: flex;
      gap: 12px;
    }

    .text-input {
      background: var(--bg-secondary);
      border: 1px solid var(--bg-surface);
      padding: 14px 18px;
      border-radius: 40px;
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      width: 100%;
      font-family: var(--font-family);
      transition: border-color 0.2s;
    }

    .text-input:focus {
      border-color: var(--accent-x);
    }

    select.text-input {
      appearance: none;
      cursor: pointer;
    }

    .admin-panel {
      background: var(--bg-secondary);
      border-radius: var(--border-radius);
      padding: 16px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 250px;
      overflow-y: auto;
    }

    .admin-player-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--bg-surface);
    }

    .admin-player-row:last-child {
      border-bottom: none;
    }

    .admin-player-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .admin-player-actions {
      display: flex;
      gap: 6px;
    }

    .admin-btn {
      background: var(--bg-surface);
      border: none;
      color: var(--text-primary);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: var(--font-family);
      transition: background 0.2s;
    }

    .admin-btn:hover {
      background: #475569;
    }

    .admin-btn.danger {
      background: var(--accent-danger);
      color: white;
    }

    .disconnection-message {
      background: var(--bg-secondary);
      border: 1px solid var(--accent-warning);
      border-radius: var(--border-radius);
      padding: 20px;
      text-align: center;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .settings-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .setting-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .setting-item label {
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--bg-secondary);
      padding: 32px;
      border-radius: 28px;
      text-align: center;
      width: 90%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
    }

    .modal-content h2 {
      font-size: 2rem;
      font-weight: 700;
    }

    .modal-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    @media (max-width: 400px) {
      .game-board {
        width: 90%;
      }
      .game-title {
        font-size: 2.5rem;
      }
      .btn {
        padding: 12px 20px;
        font-size: 1rem;
      }
    }

    @media (min-width: 768px) {
      .game-board {
        width: 70%;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="mainMenuScreen" class="screen active">
      <h1 class="game-title">DrDer X O</h1>
      <div class="menu-buttons">
        <button class="btn" id="playAIBtn">لعب ضد الذكاء الاصطناعي</button>
        <button class="btn" id="playLocalBtn">لاعبان على نفس الجهاز</button>
        <button class="btn" id="playOnlineBtn">اللعب عبر الإنترنت</button>
        <button class="btn" id="settingsBtn">الإعدادات</button>
      </div>
    </div>

    <div id="aiGameScreen" class="screen">
      <div class="game-header">
        <div class="player-info player-x" id="aiPlayerXName">X</div>
        <div class="player-info player-o" id="aiPlayerOName">O</div>
      </div>
      <div class="game-board" id="aiGameBoard"></div>
      <button class="btn back-btn" id="aiBackBtn">القائمة الرئيسية</button>
    </div>

    <div id="localGameScreen" class="screen">
      <div class="game-header">
        <div class="player-info player-x" id="localPlayerXName">X</div>
        <div class="player-info player-o" id="localPlayerOName">O</div>
      </div>
      <div class="game-board" id="localGameBoard"></div>
      <button class="btn back-btn" id="localBackBtn">القائمة الرئيسية</button>
    </div>

    <div id="onlineLobbyScreen" class="screen">
      <div class="lobby-container">
        <input type="text" id="playerNameInput" class="text-input" placeholder="أدخل اسمك" maxlength="20" autocomplete="off">
        <div class="lobby-buttons">
          <button class="btn" id="createRoomBtn">إنشاء غرفة</button>
          <button class="btn" id="joinRoomBtn">الانضمام إلى غرفة</button>
        </div>
        <input type="text" id="roomCodeInput" class="text-input" placeholder="كود الغرفة" maxlength="10" autocomplete="off" style="display:none;">
        <button class="btn back-btn" id="lobbyBackBtn">القائمة الرئيسية</button>
      </div>
    </div>

    <div id="onlineRoomScreen" class="screen">
      <div class="room-info">
        <span id="roomCodeDisplay">كود: ---</span>
        <span class="viewer-badge" id="viewerCountDisplay">👁 0</span>
      </div>
      <div class="game-header">
        <div class="player-info player-x" id="onlinePlayerXName">X</div>
        <div class="player-info player-o" id="onlinePlayerOName">O</div>
      </div>
      <div class="game-board" id="onlineGameBoard"></div>
      <div id="adminPanel" class="admin-panel" style="display:none;"></div>
      <div id="disconnectionMessage" class="disconnection-message" style="display:none;">
        <p>انقطع اتصال اللاعب الآخر</p>
        <button class="btn" id="disconnectionBackBtn">العودة للقائمة الرئيسية</button>
      </div>
      <button class="btn back-btn" id="leaveRoomBtn">مغادرة الغرفة</button>
    </div>

    <div id="settingsScreen" class="screen">
      <div class="settings-container">
        <div class="setting-item">
          <label for="aiLevelSelect">مستوى الذكاء الاصطناعي</label>
          <select id="aiLevelSelect" class="text-input">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
            <option value="impossible" selected>Impossible</option>
          </select>
        </div>
      </div>
      <button class="btn back-btn" id="settingsBackBtn">القائمة الرئيسية</button>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <h2 id="modalTitle"></h2>
      <div class="modal-buttons">
        <button class="btn primary-btn" id="modalPlayAgainBtn">لعب مرة أخرى</button>
        <button class="btn" id="modalMainMenuBtn">القائمة الرئيسية</button>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => {
            console.log('Service Worker registered with scope:', registration.scope);
          })
          .catch(error => {
            console.log('Service Worker registration failed:', error);
          });
      });
    }
  </script>
  <script src="./ai.js"></script>
  <script src="./online.js"></script>
  <script src="./app.js"></script>
</body>
</html>
